<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koordynacja — Bieżące Tematy ☁️ Online</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1f3d;--navy2:#1a3160;--blue:#2563eb;--blue-l:#dbeafe;--green:#10b981;--green-l:#d1fae5;--amber:#f59e0b;--amber-l:#fef3c7;--red:#ef4444;--red-l:#fee2e2;--purple:#8b5cf6;--purple-l:#ede9fe;--teal:#0891b2;--teal-l:#cffafe;--bg:#f0f4fa;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--light:#f8fafc;--sh:0 2px 16px rgba(15,31,61,.09);--sh2:0 12px 48px rgba(15,31,61,.18)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#1e4080 100%);position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-80px;right:-80px;width:380px;height:380px;background:radial-gradient(circle,rgba(37,99,235,.2) 0%,transparent 70%);border-radius:50%}
.hdr-inner{max-width:1400px;margin:0 auto;padding:28px 40px 24px;position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.4);color:var(--amber);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:8px}
h1{font-family:'Syne',sans-serif;font-size:clamp(22px,3vw,34px);font-weight:800;color:#fff;line-height:1.2}
h1 em{font-style:normal;color:var(--amber)}
.hdr-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.meta-p{color:rgba(255,255,255,.55);font-size:12px}
.clock-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 18px;border-radius:10px;font-size:11px;text-align:center}
.clock-box strong{display:block;font-family:'Syne',sans-serif;font-size:16px}

/* TABS */
.tabs-wrap{background:var(--navy);position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(255,255,255,.08)}
.tabs-nav{max-width:1400px;margin:0 auto;padding:0 40px;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:6px;padding:12px 16px;border:none;background:transparent;color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:rgba(255,255,255,.75)}
.tab-btn.active{color:#fff;border-bottom-color:var(--amber)}
.tbadge{background:rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}
.tab-btn.active .tbadge{background:var(--amber);color:var(--navy)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:24px 40px 60px}
.tab-panel{display:none;animation:fi .25s ease}
.tab-panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* REGION HEADER */
.reg-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.reg-title{display:flex;align-items:center;gap:12px}
.reg-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.reg-title h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--navy)}
.mgr-wrap{display:flex;align-items:center;gap:7px;margin-top:3px}
.mgr-name{font-size:12.5px;color:var(--muted)}
.mgr-edit-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-size:10.5px;color:var(--muted);cursor:pointer;transition:all .15s}
.mgr-edit-btn:hover{border-color:var(--blue);color:var(--blue)}
.mgr-input{border:1.5px solid var(--blue);border-radius:6px;padding:2px 8px;font-size:12.5px;font-family:'DM Sans',sans-serif;outline:none;width:200px}

/* BUTTONS */
.act-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:4px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:6px 13px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.act-btn:hover{border-color:var(--blue);color:var(--blue);background:#f0f7ff}
.add-btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.add-btn:hover{background:var(--blue);transform:translateY(-1px)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.stat-c{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);transition:transform .2s}
.stat-c:hover{transform:translateY(-2px)}
.stat-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-blue{background:var(--blue-l)}.s-green{background:var(--green-l)}.s-amber{background:var(--amber-l)}.s-red{background:var(--red-l)}.s-teal{background:var(--teal-l)}
.stat-v{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;color:var(--navy);line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* TABLE CARD */
.tbl-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh);margin-bottom:14px}
.tbl-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .15s}
.tbl-hdr:hover{background:var(--light)}
.tbl-hdr-left{display:flex;align-items:center;gap:9px;font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;color:var(--navy)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.c-blue{background:var(--blue-l);color:#1d4ed8}.c-green{background:var(--green-l);color:#065f46}.c-amber{background:var(--amber-l);color:#92400e}.c-red{background:var(--red-l);color:#991b1b}.c-purple{background:var(--purple-l);color:#5b21b6}.c-teal{background:var(--teal-l);color:#0e7490}
.tog{color:var(--muted);font-size:16px;transition:transform .25s}
.tbl-card.collapsed .tog{transform:rotate(-90deg)}
.tbl-body{overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);max-height:8000px}
.tbl-card.collapsed .tbl-body{max-height:0}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead th{background:var(--light);color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
.nc{width:40px;text-align:center!important}
.lc{text-align:right!important;width:150px}
.rc{text-align:right!important}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--light)}
td{padding:10px 14px;font-size:12.5px;color:var(--text);vertical-align:middle}
td.nc{color:var(--muted);font-size:11px;font-weight:600;text-align:center}
.empty-r{color:#cbd5e1;font-style:italic;font-size:12px}
.lim{display:inline-block;padding:2px 9px;border-radius:7px;font-size:11.5px;font-weight:600;font-family:'Syne',sans-serif}
.lh{background:#d1fae5;color:#065f46}.lm{background:#dbeafe;color:#1d4ed8}.ll{background:#f1f5f9;color:#475569}.lz{background:#fee2e2;color:#991b1b}
.ubj-name{font-weight:600;color:var(--navy)}
.ubj-note{font-size:11px;color:var(--muted);margin-top:2px}

/* SECTION LABEL */
.sec-lbl{margin:18px 0 10px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* ── FLOATING DETAIL PANEL ── */
.detail-panel{position:fixed;top:70px;right:0;width:420px;height:calc(100vh - 70px);background:var(--card);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(15,31,61,.12);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.detail-panel.open{transform:translateX(0)}
.dp-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
.dp-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--navy)}
.dp-cat{font-size:11px;color:var(--muted);margin-top:3px}
.dp-close{background:var(--light);border:1px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);flex-shrink:0;transition:all .15s}
.dp-close:hover{background:var(--red-l);border-color:var(--red);color:var(--red)}
.dp-body{flex:1;overflow-y:auto;padding:16px 20px}
.dp-entry{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;position:relative}
.dp-entry-text{font-size:13px;line-height:1.55;color:var(--text)}
.dp-entry-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.dp-act{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.dp-act:hover{border-color:var(--blue);color:var(--blue)}
.dp-act.del:hover{border-color:var(--red);color:var(--red)}
.dp-edit-area{width:100%;border:1.5px solid var(--blue);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:70px;display:none}
.dp-footer{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0}
.dp-add-row{display:flex;gap:8px}
.dp-add-input{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.dp-add-input:focus{border-color:var(--blue)}
.dp-add-btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.dp-add-btn:hover{background:var(--blue)}
.dp-todo-row{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;background:var(--light);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.chk{width:17px;height:17px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.dp-todo-txt{font-size:13px;line-height:1.5;flex:1}
.dp-todo-txt.done{text-decoration:line-through;color:var(--muted)}

/* MOVE SLAUGHTERHOUSE */
.ubj-move-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--muted);cursor:pointer;transition:all .15s;margin-left:6px;white-space:nowrap}
.ubj-move-btn:hover{border-color:var(--purple);color:var(--purple)}
.move-modal-bg{display:none;position:fixed;inset:0;background:rgba(15,31,61,.4);backdrop-filter:blur(3px);z-index:600;align-items:center;justify-content:center}
.move-modal-bg.open{display:flex}
.move-modal{background:var(--card);border-radius:16px;padding:26px;width:90%;max-width:420px;box-shadow:var(--sh2);animation:mi .2s ease}
@keyframes mi{from{transform:scale(.95);opacity:0}to{transform:none;opacity:1}}
.move-modal h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.move-modal p{font-size:12.5px;color:var(--muted);margin-bottom:18px}
.reg-options{display:grid;gap:8px}
.reg-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500}
.reg-opt:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.reg-opt.current{opacity:.4;pointer-events:none}
.move-cancel{margin-top:12px;width:100%;background:#f1f5f9;border:none;border-radius:9px;padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--muted)}

/* BUDGET */
.bud-simple{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.bud-kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;box-shadow:var(--sh)}
.bud-kpi-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.bud-kpi-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--navy);line-height:1}
.bud-kpi-sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.pb-wrap{margin-top:12px}
.pb-lbl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-bottom:4px}
.pb{height:8px;background:#e2e8f0;border-radius:8px;overflow:hidden}
.pb-fill{height:100%;border-radius:8px;transition:width .7s ease}
.bud-tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.bud-tbl-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;color:var(--navy)}
.bud-scroll{overflow-x:auto}
.bud-tbl{width:100%;border-collapse:collapse;min-width:600px}
.bud-tbl th{background:var(--light);color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;padding:9px 14px;text-align:right;border-bottom:1px solid var(--border)}
.bud-tbl th:first-child{text-align:left}
.bud-tbl td{padding:10px 14px;font-size:12.5px;border-bottom:1px solid var(--border);text-align:right}
.bud-tbl td:first-child{text-align:left;font-weight:500;color:var(--text)}
.bud-tbl tr:last-child td{border-bottom:none}
.bud-tbl tfoot td{background:var(--navy);color:#fff;font-weight:700;font-family:'Syne',sans-serif}
.pp{display:inline-block;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:700}
.pp-hi{background:#d1fae5;color:#065f46}.pp-mi{background:#fef3c7;color:#92400e}.pp-lo{background:#fee2e2;color:#991b1b}.pp-no{background:#f1f5f9;color:#94a3b8}
.m-act{color:var(--text)}.m-fut{opacity:.45}
.m-tag{display:inline-block;padding:1px 6px;border-radius:5px;font-size:9.5px;font-weight:600;margin-left:5px;background:var(--amber-l);color:#92400e}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.ov-card-hdr{padding:13px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.ov-card-hdr h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--navy)}
.ov-card-hdr p{font-size:10.5px;color:var(--muted);margin-top:1px}
.ov-body{padding:12px 16px}
.ov-item{display:flex;gap:9px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.ov-item:last-child{border-bottom:none}
.ov-cat{flex-shrink:0;width:75px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding-top:2px}
.ov-val{color:var(--text);line-height:1.45}
.ov-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ov-footer span{font-size:11px;color:var(--muted)}.ov-footer strong{font-family:'Syne',sans-serif;font-size:13px;color:var(--navy)}

/* ADD MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,31,61,.4);backdrop-filter:blur(3px);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:18px;padding:28px;width:90%;max-width:480px;box-shadow:var(--sh2);animation:mi .2s ease}
.modal h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--navy)}
.fr{margin-bottom:13px}
.fr label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fr input,.fr textarea,.fr select{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;resize:vertical}
.fr input:focus,.fr textarea:focus,.fr select:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{background:#f1f5f9;border:none;border-radius:9px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;color:var(--muted)}
.btn-save{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-save:hover{background:var(--blue)}

footer{text-align:center;padding:18px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:14px}

/* PRICE PANEL */
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 24px;box-shadow:var(--sh)}
.price-card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.price-big{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--navy);line-height:1}
.price-unit{font-size:13px;color:var(--muted);margin-top:4px}
.price-input-row{display:flex;gap:8px;margin-top:14px;align-items:center}
.price-input{width:110px;border:2px solid var(--border);border-radius:9px;padding:8px 12px;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--navy);outline:none;transition:border-color .2s;text-align:center}
.price-input:focus{border-color:var(--blue)}
.price-save-btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.price-save-btn:hover{background:var(--blue)}
.weekday-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.wd-card{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.wd-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.wd-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--navy)}
.wd-input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--navy);outline:none;text-align:center;margin-top:6px}
.wd-input:focus{border-color:var(--blue)}
/* ARCHIVE */
.arch-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.arch-select{border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--card);outline:none;cursor:pointer}
.arch-select:focus{border-color:var(--blue)}
.year-slider{-webkit-appearance:none;width:200px;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
.year-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--navy);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.arch-chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--sh);overflow-x:auto}
.arch-chart-inner{min-width:600px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;height:28px}
.bar-label{width:70px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;font-weight:500}
.bar-track{flex:1;height:14px;background:#f1f5f9;border-radius:7px;position:relative;overflow:visible}
.bar-fill{height:100%;border-radius:7px;transition:width .5s ease;position:relative;display:flex;align-items:center}
.bar-tip{position:absolute;right:-50px;font-size:11px;font-weight:700;white-space:nowrap;color:var(--navy)}
.arch-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.arch-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.arch-leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.arch-edit-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s}
.arch-edit-btn:hover{border-color:var(--blue);color:var(--blue)}
.arch-edit-row{display:flex;gap:6px;align-items:center;margin-top:4px;display:none}
.arch-edit-inp{width:70px;border:1.5px solid var(--blue);border-radius:6px;padding:3px 7px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;text-align:center}

// ─── DETAIL PANEL STATE ───────────────────────────────────────────────────────
let dpRegion=null, dpCatKey=null;

function openDetail(regKey, catKey){
  dpRegion=regKey; dpCatKey=catKey;
  const cat=CATS.find(c=>c.key===catKey);
  const R=REGIONS[regKey];
  document.getElementById('dp-title').textContent=cat.label;
  document.getElementById('dp-cat').innerHTML=`<span style="color:${cat.dot}">●</span> ${R.label} &nbsp;·&nbsp; ${R.icon} ${R.manager}`;
  renderDpBody();
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('dp-add-input').focus();
}

function renderDpBody(){
  const entries=REGIONS[dpRegion].topics[dpCatKey]||[];
  const body=document.getElementById('dp-body');
  if(!entries.length||entries.every(e=>!e||e==='Brak')){
    body.innerHTML='<p style="color:var(--muted);font-size:13px;padding:10px 0">Brak wpisów. Dodaj pierwszy punkt poniżej.</p>';
    return;
  }
  if(dpCatKey==='todo'){
    body.innerHTML=entries.map((txt,i)=>{
      if(!txt)return'';
      return`<div class="dp-todo-row" id="dp-e-${i}">
        <div class="chk" onclick="this.classList.toggle('done');this.textContent=this.classList.contains('done')?'✓':'';this.nextElementSibling.classList.toggle('done')"></div>
        <span class="dp-todo-txt">${txt}</span>
        <button class="dp-act del" onclick="dpDelete(${i})" style="margin-left:auto;flex-shrink:0">🗑</button>
      </div>`;
    }).join('');
  } else {
    body.innerHTML=entries.map((txt,i)=>{
      if(!txt||txt==='Brak')return'';
      return`<div class="dp-entry" id="dp-e-${i}">
        <div class="dp-entry-text" id="dp-et-${i}">${txt}</div>
        <textarea class="dp-edit-area" id="dp-ea-${i}" rows="3">${txt}</textarea>
        <div class="dp-entry-actions">
          <button class="dp-act" id="dp-edit-btn-${i}" onclick="dpStartEdit(${i})">✏️ Edytuj</button>
          <button class="dp-act" id="dp-save-btn-${i}" onclick="dpSaveEdit(${i})" style="display:none;color:var(--blue)">💾 Zapisz</button>
          <button class="dp-act del" onclick="dpDelete(${i})">🗑 Usuń</button>
        </div>
      </div>`;
    }).join('');
  }
}

function dpStartEdit(i){
  document.getElementById(`dp-et-${i}`).style.display='none';
  document.getElementById(`dp-ea-${i}`).style.display='block';
  document.getElementById(`dp-ea-${i}`).focus();
  document.getElementById(`dp-edit-btn-${i}`).style.display='none';
  document.getElementById(`dp-save-btn-${i}`).style.display='';
}
function dpSaveEdit(i){
  const val=document.getElementById(`dp-ea-${i}`).value.trim();
  if(val) REGIONS[dpRegion].topics[dpCatKey][i]=val;
  renderDpBody();
  refreshRegionTopics(dpRegion);
}
function dpDelete(i){
  REGIONS[dpRegion].topics[dpCatKey].splice(i,1);
  renderDpBody();
  refreshRegionTopics(dpRegion);
  updateBadges();
}
function dpAddEntry(){
  const inp=document.getElementById('dp-add-input');
  const txt=inp.value.trim();
  if(!txt)return;
  REGIONS[dpRegion].topics[dpCatKey].push(txt);
  inp.value='';
  renderDpBody();
  refreshRegionTopics(dpRegion);
  updateBadges();
  renderOverview();
}
function closeDetail(){document.getElementById('detail-panel').classList.remove('open');dpRegion=null;dpCatKey=null;}

// Refresh only the topics part of a region panel without full re-render
function refreshRegionTopics(key){
  const panel=document.getElementById('panel-'+key);
  const R=REGIONS[key];
  CATS.forEach((cat,ci)=>{
    const card=document.getElementById(`${key}-c${ci}`);
    if(!card)return;
    const valid=R.topics[cat.key].filter(x=>x&&x!=='Brak');
    // update chip count
    const chip=card.querySelector('.chip');
    if(chip)chip.textContent=valid.length;
    // update badge
    const b=document.getElementById('b-'+key);
    if(b)b.textContent=topicCount(key);
  });
}

// ─── MOVE SLAUGHTERHOUSE ─────────────────────────────────────────────────────
let moveRegion=null, moveIdx=null;
function openMoveModal(regKey, idx){
  moveRegion=regKey; moveIdx=idx;
  const ubj=REGIONS[regKey].slaughterhouses[idx];
  document.getElementById('move-modal-ubj').textContent=`Przenieś: ${ubj.name}`;
  const opts=document.getElementById('move-options');
  opts.innerHTML=Object.entries(REGIONS).map(([k,R])=>`
    <div class="reg-opt ${k===regKey?'current':''}" onclick="confirmMove('${k}')">
      <span>${R.icon}</span><span>${R.label}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--muted)">${R.manager}</span>
    </div>`).join('');
  document.getElementById('move-modal').classList.add('open');
}
function confirmMove(targetKey){
  if(targetKey===moveRegion){closeMoveModal();return;}
  const ubj=REGIONS[moveRegion].slaughterhouses.splice(moveIdx,1)[0];
  REGIONS[targetKey].slaughterhouses.unshift(ubj);
  closeMoveModal();
  renderRegion(moveRegion);
  renderRegion(targetKey);
  renderOverview();
}
function closeMoveModal(){document.getElementById('move-modal').classList.remove('open');moveRegion=null;moveIdx=null;}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtN(v){return v.toLocaleString('pl-PL');}
function fmtLim(v){
  if(v===0)return'<span class="lim lz">Brak</span>';
  if(v>=10000000)return`<span class="lim lh">${(v/1000000).toFixed(1)} mln</span>`;
  if(v>=1000000) return`<span class="lim lm">${(v/1000000).toFixed(2).replace('.00','')} mln</span>`;
  return`<span class="lim ll">${(v/1000).toFixed(0)} tys.</span>`;
}
function fmtM(v){return v>=1000000?(v/1000000).toFixed(1)+' mln zł':(v/1000).toFixed(0)+' tys. zł';}
function sumLim(s){return s.reduce((a,x)=>a+x.limit,0);}
function topicCount(k){return Object.values(REGIONS[k].topics).flat().filter(x=>x&&x!=='Brak').length;}
function pp(p){if(!p)return'<span class="pp pp-no">—</span>';const v=Math.round(p*100);return`<span class="pp ${v>=90?'pp-hi':v>=70?'pp-mi':'pp-lo'}">${v}%</span>`;}

    <div class="stat-c"><div class="stat-ic s-amber">💰</div><div><div class="stat-v">${fmtM(total).split(' ')[0]}</div><div class="stat-l">Suma limitów</div></div></div>

        valid.length
          ? entries.map((txt,i)=>{if(!txt||txt==='Brak')return'';return`
            <div class="dp-entry" id="ie-${key}-${ci}-${i}" style="margin-bottom:10px">

function toggleCard(id){document.getElementById(id)?.classList.toggle('collapsed');}

// ─── EDIT MANAGER ─────────────────────────────────────────────────────────────
function editMgr(key){
  const span=document.getElementById('mgr-'+key);
  const cur=REGIONS[key].manager;
  const inp=document.createElement('input');
  inp.className='mgr-input';inp.value=cur;span.replaceWith(inp);inp.focus();inp.select();
  const save=()=>{
    const val=inp.value.trim()||cur;
    REGIONS[key].manager=val;
    const ns=document.createElement('span');ns.className='mgr-name';ns.id='mgr-'+key;ns.textContent='👤 '+val;
    inp.replaceWith(ns);
    const ov=document.getElementById('ov-mgr-'+key);if(ov)ov.textContent=val;
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape'){inp.value=cur;save();}});
}

// ─── INLINE TOPIC FUNCTIONS ───────────────────────────────────────────────────
function inlineAdd(regKey,catKey,ci){const inp=document.getElementById(`inp-${regKey}-${ci}`);const txt=inp.value.trim();if(!txt)return;REGIONS[regKey].topics[catKey].push(txt);inp.value="";renderRegion(regKey);updateBadges();renderOverview();const card=document.getElementById(`${regKey}-c${ci}`);if(card)card.classList.remove("collapsed");}
function inlineDelete(regKey,catKey,idx){REGIONS[regKey].topics[catKey].splice(idx,1);const ci=CATS.findIndex(c=>c.key===catKey);renderRegion(regKey);updateBadges();renderOverview();const card=document.getElementById(`${regKey}-c${ci}`);if(card)card.classList.remove("collapsed");}
function inlineEdit(regKey,catKey,ci,i){document.getElementById(`iet-${regKey}-${ci}-${i}`).style.display="none";const ea=document.getElementById(`iea-${regKey}-${ci}-${i}`);ea.style.display="block";ea.focus();document.getElementById(`ieb-${regKey}-${ci}-${i}`).style.display="none";document.getElementById(`ies-${regKey}-${ci}-${i}`).style.display="";}
function inlineSave(regKey,catKey,ci,i){const val=document.getElementById(`iea-${regKey}-${ci}-${i}`).value.trim();if(val)REGIONS[regKey].topics[catKey][i]=val;renderRegion(regKey);renderOverview();const card=document.getElementById(`${regKey}-c${ci}`);if(card)card.classList.remove("collapsed");}

// ─── CLOUD SYNC via Netlify Function ─────────────────────────────────────────
// Netlify Function działa jako proxy — brak CORS, działa z każdej przeglądarki
const API_URL  = '/.netlify/functions/sync';   // Netlify proxy
const LS_KEY   = 'koordynacja_v1';             // localStorage fallback

let isSyncing     = false;
let syncTimer     = null;
let lastSavedHash = '';

function dataHash() {
  const s = {};
  Object.keys(REGIONS).forEach(k => {
    s[k] = { manager: REGIONS[k].manager, topics: REGIONS[k].topics, slaughterhouses: REGIONS[k].slaughterhouses };
  });
  s.__prices__ = PRICES;
  s.__arch__   = ARCH_DATA;
  return JSON.stringify(s);
}

function applySnapshot(snap) {
  Object.keys(snap).forEach(k => {
    if (k === '__prices__') {
      if (snap[k].minrol)   PRICES.minrol   = snap[k].minrol;
      if (snap[k].rolnicza) PRICES.rolnicza = snap[k].rolnicza;
      if (snap[k].weekdays) PRICES.weekdays = snap[k].weekdays;
      return;
    }
    if (k === '__arch__') { Object.assign(ARCH_DATA, snap[k]); return; }
    if (REGIONS[k]) {
      if (snap[k].manager)         REGIONS[k].manager         = snap[k].manager;
      if (snap[k].topics)          REGIONS[k].topics          = snap[k].topics;
      if (snap[k].slaughterhouses) REGIONS[k].slaughterhouses = snap[k].slaughterhouses;
    }
  });
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
async function saveToCloud() {
  if (isSyncing) return;
  const hash = dataHash();
  if (hash === lastSavedHash) return;
  isSyncing = true;
  setCloudStatus('saving', '💾 Zapisywanie...');
  // Always save to localStorage
  try { localStorage.setItem(LS_KEY, hash); } catch(e) {}
  // Try cloud
  try {
    const res  = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    hash,
    });
    if (res.ok) {
      lastSavedHash = hash;
      setCloudStatus('ok', '☁️ Zapisano • ' + new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'}));
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch(e) {
    lastSavedHash = hash;
    setCloudStatus('ok', '💾 Zapisano lokalnie • ' + new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'}));
  }
  isSyncing = false;
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadFromCloud() {
  setCloudStatus('loading', '⏳ Łączenie z chmurą...');
  // 1. Try Netlify Function (cloud)
  try {
    const ctrl    = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 6000);
    const res     = await fetch(API_URL + '?t=' + Date.now(), { signal: ctrl.signal });
    clearTimeout(timeout);
    if (res.ok) {
      const text = await res.text();
      if (text && text.length > 5 && text !== '{}') {
        const snap = JSON.parse(text);
        applySnapshot(snap);
        lastSavedHash = dataHash();
        try { localStorage.setItem(LS_KEY, lastSavedHash); } catch(e) {}
        setCloudStatus('ok', '☁️ Dane z chmury • ' + new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'}));
        return true;
      }
    }
    setCloudStatus('ok', '☁️ Połączono • brak danych w chmurze');
    return false;
  } catch(e) {
    console.log('Cloud unavailable, using localStorage:', e.message);
  }
  // 2. Fallback: localStorage
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw && raw.length > 5) {
      const snap = JSON.parse(raw);
      applySnapshot(snap);
      lastSavedHash = dataHash();
      setCloudStatus('ok', '💾 Dane lokalne • ' + new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'}));
      return true;
    }
  } catch(e) {}
  setCloudStatus('ok', '✅ Gotowy');
  return false;
}

function scheduleSave() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToCloud, 1500);
}

// ── AUTO-REFRESH every 30s ────────────────────────────────────────────────────
function startAutoRefresh() {
  setInterval(async () => {
    if (isSyncing) return;
    try {
      const res  = await fetch(API_URL + '?t=' + Date.now());
      if (!res.ok) return;
      const text = await res.text();
      if (!text || text.length < 5 || text === '{}') return;
      const snap = JSON.parse(text);
      const h    = JSON.stringify(snap);
      if (h === lastSavedHash) return;
      applySnapshot(snap);
      lastSavedHash = h;
      try { localStorage.setItem(LS_KEY, h); } catch(e) {}
      Object.keys(REGIONS).forEach(renderRegion);
      renderOverview(); renderPrices(); renderArchive(); updateBadges();
      setCloudStatus('ok', '🔄 Odświeżono • ' + new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'}));
    } catch(e) {}
  }, 30000);
}

// ── PATCH mutating functions ───────────────────────────────────────────────────
const _origInlineAdd    = inlineAdd;
inlineAdd    = function(...a) { _origInlineAdd(...a);    scheduleSave(); };
const _origInlineDelete = inlineDelete;
inlineDelete = function(...a) { _origInlineDelete(...a); scheduleSave(); };
const _origInlineSave   = inlineSave;
inlineSave   = function(...a) { _origInlineSave(...a);   scheduleSave(); };
const _origSaveEntry    = saveEntry;
saveEntry    = function()     { _origSaveEntry();        scheduleSave(); };
const _origConfirmMove  = confirmMove;
confirmMove  = function(...a) { _origConfirmMove(...a);  scheduleSave(); };
const _origEditMgr      = editMgr;
editMgr      = function(key)  { _origEditMgr(key); setTimeout(scheduleSave, 200); };

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  const loaded = await loadFromCloud();
  Object.keys(REGIONS).forEach(renderRegion);
  renderOverview();
  renderBudget();
  renderPrices();
  renderArchive();

    n.textContent = '✅ Dane wczytane';
    document.body.appendChild(n);
    setTimeout(() => { n.style.transition='opacity .5s'; n.style.opacity='0'; setTimeout(()=>n.remove(),500); }, 2500);
  }
  startAutoRefresh();
})();
